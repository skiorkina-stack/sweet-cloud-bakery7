<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Script font for title -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <!-- Clean rounded font for buttons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #e6ccff;          /* pastel purple background */
      --text-color: #000000;
      --card-bg: #ffffff;

      /* DARKER PURPLE BUTTON */
      --button-purple: #7b4dbb;
    }

    body.dark {
      --bg-color: #1e1b2e;
      --text-color: #ffffff;
      --card-bg: #2c2745;

      /* darker purple for dark mode */
      --button-purple: #9a6adf;
    }

    body {
      margin: 0;
      font-family: 'Pacifico', cursive;
      background-color: var(--bg-color);
      color: var(--text-color);

      background-image:
        radial-gradient(#ff9ff3 2px, transparent 2px),
        radial-gradient(#feca57 2px, transparent 2px),
        radial-gradient(#48dbfb 2px, transparent 2px),
        radial-gradient(#1dd1a1 2px, transparent 2px);
      background-size: 60px 60px;
      background-position: 0 0, 30px 10px, 10px 40px, 40px 30px;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
    }

    h1 {
      font-size: 3rem;
      margin: 0;
    }

    /* Button group */
    .buttons {
      display: flex;
      gap: 15px;
    }

    /* Pill buttons */
    .pill-btn {
      background: var(--button-purple);
      color: #ffffff;
      border: none;
      padding: 10px 22px;
      border-radius: 30px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .pill-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 14px rgba(0,0,0,0.3);
    }

    /* Gallery grid */
    .gallery {
      padding: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 20px;
      background: var(--card-bg);
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<header>
  <div class="buttons">
    <button class="pill-btn" onclick="window.location.href='index.html'">
      ← Return
    </button>

    <button class="pill-btn" onclick="toggleDark()">
      🌙 Dark Mode
    </button>
  </div>

  <h1>Gallery</h1>
</header>

<section class="gallery">
  <img src="Chocolate Chip Cookies.jpg" alt="Gallery Image 1">
  <img src="Macarons.jpg" alt="Gallery Image 2">
  <img src="Pie.jpg" alt="Gallery Image 3">
  <img src="Chocolate Cake.jpg" alt="Gallery Image 4">
  <img src="Cookies 1.jpg" alt="Gallery Image 5">
  <img src="Strawberries.jpg" alt="Gallery Image 6">
  <img src="Cinnamon Rolls.jpg" alt="Gallery Image 7">
  <img src="Buttery Bliss Brioche Rolls.jpg" alt="Gallery Image 8">
  <img src="Cupcakes.jpg" alt="Gallery Image 9">
  <img src="Sanrio.jpg" alt="Gallery Image 10">
</section>

<script>
  function toggleDark() {
    document.body.classList.toggle('dark');
  }
</script>

</body>
</html>
