<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Location</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Script font for title (same style as before) -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <!-- Cloud-style font for rest -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #d9f0ff;
      --text-color: #1f4f6f;
      --card-bg: #ffffff;
      --button-blue: #4da6ff;
    }

    body.dark {
      --bg-color: #1e2a38;
      --text-color: #ffffff;
      --card-bg: #2c3e50;
      --button-blue: #6bb9ff;
    }

    body {
      margin: 0;
      font-family: 'Baloo 2', cursive;
      background-color: var(--bg-color);
      color: var(--text-color);

      /* Light blue pattern */
      background-image:
        radial-gradient(#b3e5ff 2px, transparent 2px),
        radial-gradient(#a0d8ff 2px, transparent 2px);
      background-size: 60px 60px;
      background-position: 0 0, 30px 30px;
    }

    /* ---------- HEADER ---------- */
    header {
      position: relative;
      text-align: center;
      padding: 30px 20px;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 3.2rem;
      margin: 0;
    }

    .buttons {
      position: absolute;
      left: 20px;
      top: 20px;
      display: flex;
      gap: 12px;
    }

    button {
      background: var(--button-blue);
      color: #ffffff;
      border: none;
      padding: 8px 16px;
      border-radius: 22px;
      font-family: 'Baloo 2', cursive;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: transform 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    /* ---------- CONTENT BOX ---------- */
    .content {
      max-width: 900px;
      margin: 40px auto;
      padding: 30px;
      background: var(--card-bg);
      border-radius: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      text-align: center;
    }

    iframe {
      border: 0;
      width: 100%;
      height: 450px;
      border-radius: 20px;
      margin: 20px 0;
    }

    .calendar {
      height: 600px;
    }

    p {
      font-size: 1.1rem;
    }
  </style>
</head>

<body>

<header>
  <div class="buttons">
    <button onclick="window.location.href='index.html'">← Return</button>
    <button onclick="toggleDark()">🌙 Dark Mode</button>
  </div>

  <h1>Location</h1>
</header>

<section class="content">
  <h2>Our Location</h2>

  <!-- Google Map -->
  <iframe src="https://www.google.com/maps/d/embed?mid=1m7mB0kvJHPsc-q7z1FrugqjHxPyZ7I0&ehbc=2E312F" width="640" height="480"></iframe>
    
  <p>Visit us at #35 Santa Rita Road, Corozal.</p>

  <h2>Our Schedule</h2>

  <!-- Google Calendar -->
  <iframe src="https://calendar.google.com/calendar/embed?src=en.bz%23holiday%40group.v.calendar.google.com&ctz=UTC" style="border: 0" width="800" height="600" frameborder="0" scrolling="no"></iframe>
</section>

<script>
  function toggleDark() {
    document.body.classList.toggle('dark');
  }
</script>

</body>
</html>
